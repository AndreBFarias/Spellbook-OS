[Service]
# Aurora 2.2 - Configuração runtime do Ollama alinhada com Sprint 119b do Luna
# KEEP_ALIVE=30m: modelo permanece na RAM por 30min (Sprint 119b VRAM-DYNAMIC-01)
# MAX_LOADED_MODELS=3: SLM + moondream (vision) + qwen2.5-coder coexistindo
# Anterior (30s/1): forçava cold-load em cada query, quebrando Sprint 119b
Environment="OLLAMA_KEEP_ALIVE=30m"
Environment="OLLAMA_MAX_LOADED_MODELS=3"
Environment="OLLAMA_HOST=127.0.0.1:11434"
