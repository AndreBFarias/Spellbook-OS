# Aurora 2.0 - Tunings persistentes via /etc/sysctl.d/
# vm.swappiness=180 e o default do Pop!_OS 22.04 com ZRAM (NAO reduzir).
# ZRAM e RAM comprimida, swap agressivo pra ZRAM e desejado.

vm.swappiness = 180
vm.vfs_cache_pressure = 50
vm.watermark_boost_factor = 0
vm.watermark_scale_factor = 125
# Aurora 2.9 - page-cluster=0: sem readahead de swap (ideal p/ ZRAM). Persistido aqui porque
# o pop-zram-config so seta em runtime -> se ele falhasse, o valor voltava ao default 3.
vm.page-cluster = 0
kernel.sysrq = 1
