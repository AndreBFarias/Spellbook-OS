# Spellbook-OS — tmux config
# Foco: cca usável dentro de tmux (scroll do mouse, true-color, scrollback)

# --- Mouse ---
# Liga captura de mouse: scroll wheel rola scrollback (ou propaga pra app TUI
# que suportar), click seleciona pane, drag redimensiona.
# Sem isso, o gnome-terminal converte wheel em ↑/↓ e o Claude Code interpreta
# como navegação de histórico em vez de scroll.
set -g mouse on

# Scroll mais suave: 3 linhas por tick do wheel (default do tmux é 5)
bind -T copy-mode-vi WheelUpPane   send -N3 -X scroll-up
bind -T copy-mode-vi WheelDownPane send -N3 -X scroll-down

# Sair de copy-mode ao terminar drag (não fica preso esperando 'q')
unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-no-clear "xclip -sel clip -i"

# --- Cores ---
# True color (Dracula palette do Claude Code precisa)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",xterm-256color:Tc"

# --- Scrollback ---
# Claude Code gera output longo — buffer maior evita perder começo de sessão
set -g history-limit 50000

# --- Misc ---
# Reativar painel ao trocar com mouse sem perder foco do teclado
set -g focus-events on

# Tempo zero pra esc não atrapalhar TUI (vim, claude, etc)
set -sg escape-time 0
